<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flora — Dev Journal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F0F0E;--bg2:#181817;--bg3:#222220;--line:#2A2A28;--line2:#333331;--ink:#E8E6E0;--ink2:#8A887E;--ink3:#55534E;--g:#2A9D6A;--glt:#0D2B1E;--gdim:#1A5C3E;--a:#D4880A;--alt:#2B1E06;--p:#7B5FCC;--plt:#1A1330;--b:#3B82C4;--blt:#0D1E33;--r:#D45A4A;--rlt:#2B1210;--t:#2ABCBC;--tlt:#0A2222;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh}
a{color:inherit;text-decoration:none}
.shell{display:grid;grid-template-columns:270px 1fr;min-height:100vh}
.topbar{display:none;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:200}
.topbar-logo{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--g);letter-spacing:-1px}
.hamburger{background:none;border:1px solid var(--line);border-radius:6px;padding:7px 10px;cursor:pointer;display:flex;flex-direction:column;gap:4px}
.hamburger span{display:block;width:18px;height:2px;background:var(--ink2);border-radius:1px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300}
.overlay.on{display:block}
.sidebar{background:var(--bg2);border-right:1px solid var(--line);padding:28px 0 0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sidebar::-webkit-scrollbar{width:0}
.logo{padding:0 24px 22px;border-bottom:1px solid var(--line);margin-bottom:14px}
.logo-mark{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--g);letter-spacing:-1px}
.logo-sub{font-size:11px;color:var(--ink3);margin-top:2px;letter-spacing:.04em;line-height:1.4}
.sidebar-section{padding:8px 24px 4px;font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 24px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{border-left-color:var(--g);background:var(--glt)}
.nav-ico{width:16px;text-align:center;font-size:13px;flex-shrink:0;opacity:.85}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-text{font-size:12.5px;color:var(--ink2);line-height:1.35}
.nav-text strong{display:block;font-size:12px;font-weight:500;color:var(--ink)}
.nav-item.active .nav-text,.nav-item.active .nav-text strong,.nav-item.active .nav-ico{color:var(--g)}
.nav-days{max-height:240px;overflow-y:auto}
.nav-days::-webkit-scrollbar{width:4px}.nav-days::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.sidebar-footer{margin-top:auto;padding:18px 24px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--bg2)}
.progress-label{font-size:11px;color:var(--ink3);margin-bottom:8px;display:flex;justify-content:space-between}
.progress-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--g);border-radius:2px;width:5%;transition:width .4s}
.ph{flex:1;height:3px;border-radius:2px;background:var(--bg3)}
.ph.done{background:var(--g)}.ph.active{background:var(--a)}
.progress-phases{display:flex;gap:6px;margin-top:10px}
.main{padding:44px 56px;max-width:960px}
@media(max-width:900px){
  .shell{grid-template-columns:1fr}
  .topbar{display:flex}
  .sidebar{position:fixed;top:0;left:0;width:270px;height:100vh;z-index:400;transform:translateX(-100%);padding-top:16px}
  .sidebar.open{transform:translateX(0)}
  .main{padding:26px 20px}
}
@media(max-width:600px){
  .main{padding:20px 14px}
  .page-title{font-size:24px}
  .stats{grid-template-columns:1fr 1fr}
  .stat-n{font-size:22px}
  .day-title-text{font-size:15px}
  .phase-row{gap:6px}
  .phase-chip{font-size:10px;padding:4px 8px}
  .ann-table{display:block;overflow-x:auto}
  .ann-table td:first-child{width:130px;font-size:10px;white-space:normal;word-break:break-all}
  .ann-table td{font-size:11.5px;padding:7px 8px}
  .code-block pre{font-size:11px}
  .code-file-label{font-size:10px;flex-wrap:wrap;gap:4px}
  .rel-diagram{font-size:11px}
  .phase-header{flex-direction:column;align-items:flex-start;gap:6px}
  .upcoming-item{flex-direction:column;gap:3px}
  .uday{width:auto;font-size:10px}
  .day-header{flex-wrap:wrap;gap:8px}
  .elist li{font-size:12px}
  .cal-cell{min-height:54px;font-size:11px}
  .hero{flex-direction:column}
}
/* shared */
.page-header{margin-bottom:34px}
.page-eyebrow{font-family:var(--mono);font-size:11px;color:var(--g);letter-spacing:.08em;margin-bottom:10px}
.page-title{font-size:30px;font-weight:600;color:var(--ink);letter-spacing:-1px;line-height:1.1;margin-bottom:10px}
.page-sub{font-size:14px;color:var(--ink2);line-height:1.7;max-width:600px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:40px}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:16px}
.stat-n{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-l{font-size:11px;color:var(--ink3);letter-spacing:.04em}
.sec-head{display:flex;align-items:center;gap:12px;margin:34px 0 20px}
.sec-line{flex:1;height:1px;background:var(--line)}
.sec-label{font-family:var(--mono);font-size:11px;color:var(--ink3);letter-spacing:.08em;white-space:nowrap}
.phase-row{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.phase-chip{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:5px;border:1px solid}
.phase-chip.done{background:var(--glt);color:var(--g);border-color:var(--gdim)}
.phase-chip.active{background:var(--alt);color:var(--a);border-color:#4A3010}
.phase-chip.todo{background:var(--bg2);color:var(--ink3);border-color:var(--line)}
/* hero (dashboard) */
.hero{display:flex;gap:20px;align-items:stretch;margin-bottom:32px}
.hero-main{flex:1;background:linear-gradient(135deg,var(--glt),var(--bg2));border:1px solid var(--gdim);border-radius:14px;padding:26px 28px;position:relative;overflow:hidden}
.hero-main::after{content:'🌿';position:absolute;right:-10px;bottom:-20px;font-size:120px;opacity:.06}
.hero-eyebrow{font-family:var(--mono);font-size:11px;color:var(--g);letter-spacing:.08em;margin-bottom:8px}
.hero-h{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;line-height:1.15}
.hero-p{font-size:13px;color:var(--ink2);line-height:1.6;max-width:440px;position:relative;z-index:1}
.hero-cta{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-family:var(--mono);font-size:12px;color:var(--g);background:var(--bg);border:1px solid var(--gdim);padding:8px 14px;border-radius:7px;cursor:pointer;transition:all .15s}
.hero-cta:hover{background:var(--glt)}
.hero-side{width:200px;display:flex;flex-direction:column;gap:12px}
.streak{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:18px;display:flex;flex-direction:column;justify-content:center;text-align:center}
.streak-n{font-family:var(--mono);font-size:40px;font-weight:700;color:var(--a);line-height:1}
.streak-l{font-size:11px;color:var(--ink3);margin-top:6px;letter-spacing:.04em}
.streak-fire{font-size:22px;margin-bottom:4px}
.mini-phase{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.mini-phase-t{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;justify-content:space-between}
.mini-phase-t b{color:var(--a);font-family:var(--mono)}
/* day entry */
.day-entry{margin-bottom:40px}
.day-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px}
.day-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px;white-space:nowrap;margin-top:2px}
.day-badge.done{background:var(--glt);color:var(--g);border:1px solid var(--gdim)}
.day-badge.today{background:var(--alt);color:var(--a);border:1px solid #4A3010}
.day-badge.upcoming{background:var(--bg3);color:var(--ink3);border:1px solid var(--line)}
.day-title-text{font-size:18px;font-weight:600;color:var(--ink);letter-spacing:-.3px}
.day-date{font-size:12px;color:var(--ink3);margin-top:3px;font-family:var(--mono)}
.day-tagrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.day-tag{font-family:var(--mono);font-size:10px;color:var(--ink2);background:var(--bg3);border:1px solid var(--line);padding:2px 8px;border-radius:4px}
.block{background:var(--bg2);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.block-head{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:8px 14px;border-bottom:1px solid var(--line)}
.block-body{padding:14px}
.block.built .block-head{color:var(--g);background:var(--glt)}
.block.learned .block-head{color:var(--p);background:var(--plt)}
.block.next .block-head{color:var(--a);background:var(--alt)}
.block.note .block-head{color:var(--ink2);background:var(--bg3)}
.block.code .block-head{color:var(--t);background:var(--tlt)}
.elist{list-style:none;display:flex;flex-direction:column;gap:8px}
.elist li{display:flex;gap:10px;font-size:13px;color:var(--ink2);line-height:1.6;align-items:flex-start}
.elist li::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:7px}
.block.built .elist li::before{background:var(--g)}
.block.learned .elist li::before{background:var(--p)}
.block.next .elist li::before{background:var(--a)}
.block.note .elist li::before{background:var(--ink3)}
.block.code .elist li::before{background:var(--t)}
.elist li span{color:var(--ink);font-weight:500}
.code-file{margin-bottom:20px}
.code-file-label{font-family:var(--mono);font-size:11px;color:var(--t);background:var(--tlt);border:1px solid var(--line2);border-bottom:none;padding:7px 14px;border-radius:8px 8px 0 0;display:flex;align-items:center;gap:8px}
.code-file-label span{color:var(--ink3)}
.code-block{background:var(--bg);border:1px solid var(--line2);border-radius:0 0 8px 8px;overflow-x:auto}
.code-block pre{font-family:var(--mono);font-size:12px;line-height:1.9;padding:16px;white-space:pre}
.kw{color:#C792EA}.val{color:var(--g)}.cmt{color:var(--ink3);font-style:italic}.prop{color:var(--b)}.ann{color:var(--a)}.cls{color:#FFCB6B}.str{color:#C3E88D}
.ann-table{width:100%;border-collapse:collapse;margin-top:10px}
.ann-table th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);padding:7px 12px;border-bottom:1px solid var(--line2);text-align:left}
.ann-table td{font-size:12.5px;padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.6}
.ann-table tr:last-child td{border-bottom:none}
.ann-table td:first-child{font-family:var(--mono);font-size:11px;color:var(--a);white-space:nowrap;width:220px}
.ann-table td:last-child{color:var(--ink2)}
.ann-table tr:hover td{background:var(--bg3)}
.rel-diagram{background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:16px;margin:10px 0;font-family:var(--mono);font-size:12px;color:var(--ink2);line-height:1.9;overflow-x:auto}
.extra-title{margin-top:16px;margin-bottom:4px;font-size:11px;font-weight:600;color:var(--t);text-transform:uppercase;letter-spacing:.08em}
/* day nav (prev/next) */
.day-nav{display:flex;justify-content:space-between;gap:12px;margin:28px 0 8px}
.day-nav a{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 16px;transition:all .15s;cursor:pointer}
.day-nav a:hover{border-color:var(--gdim);background:var(--glt)}
.day-nav a.disabled{opacity:.35;pointer-events:none}
.day-nav .dn-dir{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.06em}
.day-nav .dn-t{font-size:13px;color:var(--ink);font-weight:500;margin-top:3px}
.day-nav a.next-dir{text-align:right}
.backlink{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--ink3);margin-bottom:20px;cursor:pointer}
.backlink:hover{color:var(--g)}
/* calendar */
.cal-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:24px}
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-month{font-size:18px;font-weight:600;letter-spacing:-.3px}
.cal-month span{color:var(--ink3);font-family:var(--mono);font-size:13px;font-weight:400;margin-left:6px}
.cal-btns{display:flex;gap:8px}
.cal-btn{background:var(--bg3);border:1px solid var(--line);border-radius:7px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);font-size:16px;transition:all .15s}
.cal-btn:hover{background:var(--glt);color:var(--g);border-color:var(--gdim)}
.cal-btn.txt{width:auto;padding:0 12px;font-family:var(--mono);font-size:11px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{font-family:var(--mono);font-size:10px;color:var(--ink3);text-align:center;padding:4px 0;letter-spacing:.06em}
.cal-cell{min-height:74px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 8px;position:relative;display:flex;flex-direction:column}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.has{cursor:pointer;border-color:var(--gdim);background:var(--glt);transition:all .15s}
.cal-cell.has:hover{background:#10341f;transform:translateY(-1px)}
.cal-cell.today{outline:1px solid var(--a)}
.cal-dnum{font-family:var(--mono);font-size:12px;color:var(--ink3)}
.cal-cell.has .cal-dnum{color:var(--g);font-weight:700}
.cal-cell.today .cal-dnum{color:var(--a)}
.cal-daylabel{font-family:var(--mono);font-size:9px;color:var(--g);margin-top:2px}
.cal-dtitle{font-size:10.5px;color:var(--ink2);line-height:1.3;margin-top:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical}
.cal-legend{display:flex;gap:18px;margin-top:16px;flex-wrap:wrap}
.cal-legend div{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink3)}
.cal-legend .sw{width:12px;height:12px;border-radius:3px}
/* timeline */
.tl-search{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:11px 14px;color:var(--ink);font-family:var(--sans);font-size:13px;margin-bottom:24px}
.tl-search:focus{outline:none;border-color:var(--gdim)}
.tl-search::placeholder{color:var(--ink3)}
.tl{position:relative;padding-left:30px}
.tl::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;margin-bottom:14px;cursor:pointer}
.tl-item::before{content:'';position:absolute;left:-26px;top:18px;width:11px;height:11px;border-radius:50%;background:var(--g);border:2px solid var(--bg);box-shadow:0 0 0 2px var(--gdim)}
.tl-item.upcoming::before{background:var(--bg3);box-shadow:0 0 0 2px var(--line)}
.tl-card{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 18px;transition:all .15s}
.tl-item:hover .tl-card{border-color:var(--gdim);background:var(--glt)}
.tl-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.tl-day{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--g)}
.tl-date{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.tl-title{font-size:14.5px;font-weight:600;color:var(--ink);letter-spacing:-.2px}
.tl-summary{font-size:12.5px;color:var(--ink2);line-height:1.55;margin-top:5px}
.tl-counts{display:flex;gap:14px;margin-top:9px;flex-wrap:wrap}
.tl-counts span{font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.tl-counts b{color:var(--ink2)}
/* roadmap */
.upcoming-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.upcoming-item:last-child{border-bottom:none}
.uday{font-family:var(--mono);font-size:11px;color:var(--ink3);width:52px;flex-shrink:0;padding-top:2px}
.utitle{font-size:13.5px;font-weight:500;color:var(--ink);margin-bottom:3px}
.udesc{font-size:12px;color:var(--ink3);line-height:1.5}
.phase-block{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:32px}
.phase-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.phase-name{font-size:14px;font-weight:600;color:var(--ink)}
.phase-tag{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px}
.phase-tag.active{background:var(--alt);color:var(--a)}
.phase-tag.todo{background:var(--bg3);color:var(--ink3)}
.phase-tag.done{background:var(--glt);color:var(--g)}
.phase-body{padding:16px 20px}
.phase-progress{display:flex;gap:6px;margin-bottom:14px}
.phase-step{flex:1;height:3px;border-radius:2px;background:var(--bg3)}
.phase-step.done{background:var(--g)}.phase-step.active{background:var(--a)}
.phase-desc{font-size:12.5px;color:var(--ink2);line-height:1.65}
.inline-code{font-family:var(--mono);font-size:11px;color:var(--g);background:var(--glt);padding:1px 6px;border-radius:3px}
.day-divider{height:1px;background:var(--line);margin:40px 0}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink3)}
.empty-state .es-ico{font-size:40px;margin-bottom:12px;opacity:.5}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">🌿 flora</div>
  <button class="hamburger" id="hbtn" aria-label="Open navigation"><span></span><span></span><span></span></button>
</div>
<div class="overlay" id="overlay"></div>
<div class="shell">
<nav class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-mark">🌿 flora</div>
    <div class="logo-sub">Farmer Livelihood and Operations Resource Assistant</div>
  </div>
  <div class="sidebar-section">Navigate</div>
  <a class="nav-item" data-view="dashboard" href="#/dashboard"><div class="nav-ico">◧</div><div class="nav-text"><strong>Dashboard</strong>Overview &amp; progress</div></a>
  <a class="nav-item" data-view="calendar" href="#/calendar"><div class="nav-ico">▦</div><div class="nav-text"><strong>Calendar</strong>Month view</div></a>
  <a class="nav-item" data-view="timeline" href="#/timeline"><div class="nav-ico">≡</div><div class="nav-text"><strong>Timeline</strong>Every day, in order</div></a>
  <a class="nav-item" data-view="roadmap" href="#/roadmap"><div class="nav-ico">◈</div><div class="nav-text"><strong>Roadmap</strong>The 4-phase plan</div></a>
  <div class="sidebar-section">Daily Logs</div>
  <div class="nav-days" id="navDays"></div>
  <div class="sidebar-footer">
    <div class="progress-label"><span>Overall progress</span><span id="pgLabel" style="color:var(--g);font-family:var(--mono)">—</span></div>
    <div class="progress-track"><div class="progress-fill" id="pgFill"></div></div>
    <div class="progress-phases" id="pgPhases" style="margin-top:8px"></div>
  </div>
</nav>

<main class="main" id="app"></main>
</div>

<script>
/* ============================================================================
   FLORA DEV JOURNAL — DATA
   ----------------------------------------------------------------------------
   TO ADD A NEW DAY: copy a {} block in JOURNAL, bump `day`, set `date`
   ("YYYY-MM-DD"), fill the fields. Everything else (calendar, stats, streak,
   sidebar, progress bar) updates automatically. Just save & refresh.

   FIELD GUIDE per day object:
     day        number   — sequential day number
     date       string   — "YYYY-MM-DD"
     title      string   — short headline
     phase      number   — 1..4

    │  breed_id, breed_name, breed_name_tamil, <span style="color:var(--a)">animal_type_id (FK)</span>
    │
    │  @ManyToOne — many animals have one breed
    │
    ▼
<span style="color:var(--g)">animals</span>
    │  animal_id, animal_name, gender, date_of_birth
    │  weight_kg, health_status, unique_tag_number
    │  <span style="color:var(--a)">farmer_id (FK)</span>, <span style="color:var(--a)">animal_type_id (FK)</span>, <span style="color:var(--a)">breed_id (FK)</span>
    │
    ├── AnimalHealthRecord  (symptoms checker results — Day 3)
    ├── MilkRecord          (daily yield tracking — Day 3)
    └── VaccinationRecord   (vaccination schedule — Day 3)</pre>` },
    { type:"table", title:"@ManyToOne — the rule to remember",
      html:`<table class="ann-table">
          <thead><tr><th>Situation</th><th>Annotation</th><th>Real example in Flora</th></tr></thead>
          <tbody>
            <tr><td>Many X belong to One Y</td><td>@ManyToOne in X.java</td><td>Many Animals → One Farmer. Write @ManyToOne in Animal.java</td></tr>
            <tr><td>One X has Many Y</td><td>@OneToMany in X.java</td><td>One State → Many Districts. Write @OneToMany in State.java</td></tr>
            <tr><td>Many X relate to Many Y</td><td>@ManyToMany + @JoinTable</td><td>Farmer ↔ Crops. Write @ManyToMany in Farmer.java with @JoinTable</td></tr>
            <tr><td>Key rule</td><td>Read from where you are</td><td>Standing in Animal.java — ask "how many of ME point to one of THEM?" Many animals → one breed = @ManyToOne</td></tr>
          </tbody>
        </table>` }
  ],
  next:[
    `<span>AnimalHealthRecord.java</span> — symptoms checker result per animal. Fields: symptoms, predictedDisease, confidenceScore, severity, actionRequired, isVetVisitRequired.`,
    `<span>MilkRecord.java</span> — daily milk and egg yield. MORNING/EVENING sessions. Used for trend charts and 20% drop detection alert.`,
    `<span>VaccinationRecord.java</span> — vaccination schedule per animal. dueDate drives the 3-day FCM push reminder. vaccinationStatus (PENDING/COMPLETED/OVERDUE).`,
    `<span>Remaining entities</span> — SoilScan, WeatherSnapshot, Prediction, MarketPrice, ChatSession, ChatMessage, Alert, DeviceToken, Feedback.`
  ],
  snapshot:{ entities:7, enums:5, tables:9, endpoints:0 }
}
];

/* ============================================================================
   ENGINE — renders pages from data. No need to edit below to add a day.
   ========================================================================== */
const $app = document.getElementById('app');
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function byDate(){ return [...JOURNAL].sort((a,b)=>a.date.localeCompare(b.date)); }
function byDay(n){ return JOURNAL.find(d=>d.day===Number(n)); }
function latest(){ return byDate()[byDate().length-1]; }
function fmtDate(s){ const [y,m,d]=s.split('-').map(Number); return `${MONTHS[m-1]} ${d}, ${y}`; }
function fmtShort(s){ const [y,m,d]=s.split('-').map(Number); return `${String(d).padStart(2,'0')} ${MONTHS[m-1].slice(0,3)}`; }

function streak(){
  const dates = byDate().map(d=>d.date);
  if(!dates.length) return 0;
  let s=1;
  for(let i=dates.length-1;i>0;i--){
    const a=new Date(dates[i]), b=new Date(dates[i-1]);
    if(Math.round((a-b)/86400000)===1) s++; else break;
  }
  return s;
}
function totalSnapshot(){
  const l=latest(); return l&&l.snapshot ? l.snapshot : {entities:0,enums:0,tables:0,endpoints:0};
}

/* Effective status — derived, so you never hand-flip "today" → "done".
   The latest-dated logged entry is always "today"; earlier ones are "done";
   anything explicitly marked "upcoming" stays upcoming. */
function effStatus(d){
  if(d.status==='upcoming') return 'upcoming';
  const l=latest();
  return (l && d.day===l.day) ? 'today' : 'done';
}

/* ---------- shared bits ---------- */
function elist(cls, items){
  if(!items||!items.length) return '';
  return `<ul class="elist">`+items.map(i=>`<li>${i}</li>`).join('')+`</ul>`;
}
function badgeClass(s){ return s==='today'?'today':(s==='upcoming'?'upcoming':'done'); }
function badgeText(d){ const s=effStatus(d); return s==='today'?`Day ${d.day} • today`:(s==='upcoming'?`Day ${d.day}`:`Day ${d.day} ✓`); }

function renderDayBody(d){
  let h='';
  if(d.built&&d.built.length) h+=`<div class="block built"><div class="block-head">What we built</div><div class="block-body">${elist('built',d.built)}</div></div>`;
  if(d.understood&&d.understood.length) h+=`<div class="block learned"><div class="block-head">What we understood</div><div class="block-body">${elist('learned',d.understood)}</div></div>`;
  if((d.code&&d.code.length)||(d.extras&&d.extras.length)){
    h+=`<div class="block code"><div class="block-head">Code &amp; design — files explained</div><div class="block-body">`;
    (d.code||[]).forEach(c=>{
      h+=`<div class="code-file"><div class="code-file-label">📄 ${c.file} <span>— ${c.sub}</span></div><div class="code-block"><pre>${c.code}</pre></div></div>`;
    });
    (d.extras||[]).forEach(e=>{
      h+=`<div class="extra-title">${e.title}</div>`;
      h+= e.type==='diagram' ? `<div class="rel-diagram">${e.html}</div>` : e.html;
    });
    h+=`</div></div>`;
  }
  if(d.next&&d.next.length) h+=`<div class="block next"><div class="block-head">What comes next — Day ${d.day+1}</div><div class="block-body">${elist('next',d.next)}</div></div>`;
  return h;
}

/* ---------- DASHBOARD ---------- */
function viewDashboard(){
  const l=latest(), snap=totalSnapshot(), st=streak();
  const activePhase=PHASES.find(p=>p.status==='active')||PHASES[0];
  const tags=(l.tags||[]).map(t=>`<span class="day-tag">${t}</span>`).join('');
  $app.innerHTML=`
  <div class="page-header fade">
    <div class="page-eyebrow">// ${META.project.toLowerCase()} · ${META.subtitle}</div>
    <div class="page-title">Dev Journal</div>
    <div class="page-sub">A daily log of what was built, what was understood, and what comes next. Every line of code explained. Updated every session.</div>
  </div>

  <div class="hero fade">
    <div class="hero-main">
      <div class="hero-eyebrow">// latest entry · ${fmtDate(l.date)}</div>
      <div class="hero-h">Day ${l.day} — ${l.title}</div>
      <div class="hero-p">${l.summary||''}</div>
      <div class="day-tagrow" style="position:relative;z-index:1">${tags}</div>
      <a class="hero-cta" href="#/day/${l.day}">Open Day ${l.day} →</a>
    </div>
    <div class="hero-side">
      <div class="streak">
        <div class="streak-fire">🔥</div>
        <div class="streak-n">${st}</div>
        <div class="streak-l">day streak</div>
      </div>
      <div class="mini-phase">
        <div class="mini-phase-t"><span>Current phase</span><b>${activePhase.done}/${activePhase.steps}</b></div>
        <div class="phase-progress">${phaseSteps(activePhase)}</div>
        <div style="font-size:12px;color:var(--ink2);font-weight:500">${activePhase.name}</div>
      </div>
    </div>
  </div>

  <div class="stats fade">
    ${statCard(JOURNAL.filter(d=>d.status!=='upcoming').length,'days logged','var(--g)')}
    ${statCard(snap.entities,'entities created','var(--p)')}
    ${statCard(snap.tables,'tables in MySQL','var(--b)')}
    ${statCard(snap.endpoints,'endpoints built','var(--a)')}
  </div>

  <div class="phase-row fade">
    ${PHASES.map(p=>`<div class="phase-chip ${p.status}">${p.name}${p.status==='active'?' · active':''}</div>`).join('')}
  </div>

  <div class="sec-head"><div class="sec-label">// recent activity</div><div class="sec-line"></div></div>
  <div class="tl fade">${byDate().slice().reverse().slice(0,4).map(tlItem).join('')}</div>
  <a class="hero-cta" href="#/timeline" style="margin-top:4px">View full timeline →</a>
  `;
}
function statCard(n,l,c){ return `<div class="stat"><div class="stat-n" style="color:${c}">${n}</div><div class="stat-l">${l}</div></div>`; }
function phaseSteps(p){ let h=''; for(let i=0;i<p.steps;i++){ h+=`<div class="phase-step ${i<p.done?'done':(i===p.done&&p.status==='active'?'active':'')}"></div>`; } return h; }

/* ---------- CALENDAR ---------- */
let calY, calM; // current calendar month
function viewCalendar(){
  if(calY===undefined){ const l=latest(); const [y,m]=l.date.split('-').map(Number); calY=y; calM=m-1; }
  $app.innerHTML=`
  <div class="page-header fade">
    <div class="page-eyebrow">// calendar view</div>
    <div class="page-title">The Journey, by date</div>
    <div class="page-sub">Each green tile is a logged day. Click any tile to open that day's full entry.</div>
  </div>
  <div class="cal-wrap fade" id="calWrap"></div>`;
  renderCal();
}
function renderCal(){
  const map={}; JOURNAL.forEach(d=>{ if(d.status!=='upcoming') map[d.date]=d; });
  const first=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const today=new Date(); const tStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  let cells='';
  DOW.forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<first;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let dd=1;dd<=days;dd++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const entry=map[ds];
    const cls=['cal-cell']; if(entry) cls.push('has'); if(ds===tStr) cls.push('today');
    const inner = entry
      ? `<div class="cal-dnum">${dd}</div><div class="cal-daylabel">Day ${entry.day}</div><div class="cal-dtitle">${entry.title}</div>`
      : `<div class="cal-dnum">${dd}</div>`;
    cells+= entry
      ? `<a class="${cls.join(' ')}" href="#/day/${entry.day}">${inner}</a>`
      : `<div class="${cls.join(' ')}">${inner}</div>`;
  }
  document.getElementById('calWrap').innerHTML=`
    <div class="cal-top">
      <div class="cal-month">${MONTHS[calM]} <span>${calY}</span></div>
      <div class="cal-btns">
        <div class="cal-btn" id="calPrev">‹</div>
        <div class="cal-btn txt" id="calToday">today</div>
        <div class="cal-btn" id="calNext">›</div>
      </div>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <div><span class="sw" style="background:var(--glt);border:1px solid var(--gdim)"></span> Logged day</div>
      <div><span class="sw" style="background:var(--bg);border:1px solid var(--line);outline:1px solid var(--a)"></span> Today</div>
      <div><span class="sw" style="background:var(--bg);border:1px solid var(--line)"></span> No entry</div>
    </div>`;
  document.getElementById('calPrev').onclick=()=>{ calM--; if(calM<0){calM=11;calY--;} renderCal(); };
  document.getElementById('calNext').onclick=()=>{ calM++; if(calM>11){calM=0;calY++;} renderCal(); };
  document.getElementById('calToday').onclick=()=>{ const t=new Date(); calY=t.getFullYear(); calM=t.getMonth(); renderCal(); };
}

/* ---------- TIMELINE ---------- */
function tlItem(d){
  const c=d.snapshot||{};
  const counts=[];
  if(d.built) counts.push(`<span><b>${d.built.length}</b> built</span>`);
  if(d.understood) counts.push(`<span><b>${d.understood.length}</b> learned</span>`);
  if(d.code) counts.push(`<span><b>${d.code.length}</b> files</span>`);
  const es=effStatus(d);
  return `<a class="tl-item ${es==='upcoming'?'upcoming':''}" href="#/day/${d.day}">
    <div class="tl-card">
      <div class="tl-meta"><span class="tl-day">Day ${d.day}</span><span class="tl-date">${fmtDate(d.date)}</span>${es==='today'?'<span class="day-badge today" style="font-size:9px;padding:2px 7px">today</span>':''}</div>
      <div class="tl-title">${d.title}</div>
      <div class="tl-summary">${d.summary||''}</div>
      <div class="tl-counts">${counts.join('')}</div>
    </div></a>`;
}
function viewTimeline(){
  $app.innerHTML=`
  <div class="page-header fade">
    <div class="page-eyebrow">// timeline</div>
    <div class="page-title">Every day, in order</div>
    <div class="page-sub">The full build, one entry per session. Search to jump to a topic, a file, or a concept.</div>
  </div>
  <input class="tl-search" id="tlSearch" placeholder="Search days — e.g. enum, @ManyToOne, JWT, breed…">
  <div class="tl fade" id="tlList"></div>`;
  const list=document.getElementById('tlList');
  const draw=(q)=>{
    q=(q||'').toLowerCase().trim();
    const items=byDate().filter(d=>{
      if(!q) return true;
      const hay=(d.title+' '+(d.summary||'')+' '+(d.tags||[]).join(' ')+' '+JSON.stringify(d.built||[])+JSON.stringify(d.understood||[])+JSON.stringify(d.code||[])).toLowerCase();
      return hay.includes(q);
    });
    list.innerHTML = items.length ? items.map(tlItem).join('') : `<div class="empty-state"><div class="es-ico">🔍</div>No entries match "${q}".</div>`;
  };
  draw('');
  document.getElementById('tlSearch').addEventListener('input',e=>draw(e.target.value));
}

/* ---------- DAY DETAIL ---------- */
function viewDay(n){
  const d=byDay(n);
  if(!d){ $app.innerHTML=`<div class="empty-state fade"><div class="es-ico">🌱</div>No entry for Day ${n} yet.<br><br><a class="hero-cta" href="#/timeline">Back to timeline</a></div>`; return; }
  const ordered=byDate();
  const idx=ordered.findIndex(x=>x.day===d.day);
  const prev=ordered[idx-1], next=ordered[idx+1];
  const tags=(d.tags||[]).map(t=>`<span class="day-tag">${t}</span>`).join('');
  $app.innerHTML=`
  <a class="backlink fade" href="#/timeline">‹ back to timeline</a>
  <div class="day-entry fade" id="day${d.day}">
    <div class="day-header">
      <div class="day-badge ${badgeClass(effStatus(d))}">${badgeText(d)}</div>
      <div>
        <div class="day-title-text">${d.title}</div>
        <div class="day-date">${fmtDate(d.date)} · Phase ${d.phase} · ${PHASES[d.phase-1].name.split('—')[1].trim()}</div>
        <div class="day-tagrow">${tags}</div>
      </div>
    </div>
    ${renderDayBody(d)}
    <div class="day-nav">
      ${prev?`<a href="#/day/${prev.day}"><div class="dn-dir">‹ previous</div><div class="dn-t">Day ${prev.day} — ${prev.title}</div></a>`:`<a class="disabled"><div class="dn-dir">‹ previous</div><div class="dn-t">Start of journal</div></a>`}
      ${next?`<a class="next-dir" href="#/day/${next.day}"><div class="dn-dir">next ›</div><div class="dn-t">Day ${next.day} — ${next.title}</div></a>`:`<a class="next-dir disabled"><div class="dn-dir">next ›</div><div class="dn-t">Latest entry</div></a>`}
    </div>
  </div>`;
  window.scrollTo(0,0);
}

/* ---------- ROADMAP ---------- */
function viewRoadmap(){
  // Hide any planned day already logged in JOURNAL — no manual "move" needed.
  const upcoming=PLAN.filter(p=>{
    const m=(p.day||'').match(/\d+/);
    return !(m && byDay(m[0]));
  });
  $app.innerHTML=`
  <div class="page-header fade">
    <div class="page-eyebrow">// full project roadmap</div>
    <div class="page-title">The 4-Phase Plan</div>
    <div class="page-sub">From foundation to a production app live on AWS. Each phase ends with a gate check that must pass before moving on.</div>
  </div>
  <div class="sec-head"><div class="sec-label">// planned build order — phase 1</div><div class="sec-line"></div></div>
  <div class="block note fade" style="margin-bottom:32px">
    <div class="block-head">Upcoming days</div>
    <div class="block-body">
      ${upcoming.length ? upcoming.map(p=>`<div class="upcoming-item"><div class="uday">${p.day}</div><div><div class="utitle">${p.title}</div><div class="udesc">${p.desc}</div></div></div>`).join('') : `<div class="udesc" style="padding:6px 0">All planned days for this phase are logged. 🎉</div>`}
    </div>
  </div>
  <div class="sec-head"><div class="sec-label">// the phases</div><div class="sec-line"></div></div>
  ${PHASES.map(p=>`
    <div class="phase-block fade">
      <div class="phase-header"><div class="phase-name">${p.name}</div><div class="phase-tag ${p.status}">${p.when}${p.status==='active'?' · In progress':''}</div></div>
      <div class="phase-body">
        <div class="phase-progress">${phaseSteps(p)}</div>
        <div class="phase-desc">${p.desc}</div>
      </div>
    </div>`).join('')}
  `;
}

/* ---------- sidebar + router ---------- */
function buildSidebarDays(){
  const wrap=document.getElementById('navDays');
  wrap.innerHTML=byDate().slice().reverse().map(d=>{
    const es=effStatus(d);
    return `<a class="nav-item" data-view="day" data-day="${d.day}" href="#/day/${d.day}">
      <div class="nav-dot" style="background:${es==='upcoming'?'var(--ink3)':'var(--g)'}"></div>
      <div class="nav-text"><strong>Day ${d.day}${es==='done'?' ✓':(es==='today'?' • today':'')}</strong>${d.title.split('·')[0].trim().slice(0,30)}</div>
    </a>`;}).join('');
}
function buildProgress(){
  const logged=JOURNAL.filter(d=>d.status!=='upcoming').length;
  document.getElementById('pgLabel').textContent=`Day ${logged} / ~${META.totalDays}`;
  document.getElementById('pgFill').style.width=Math.max(4,Math.round(logged/META.totalDays*100))+'%';
  document.getElementById('pgPhases').innerHTML=PHASES.map(p=>`<div class="ph ${p.status==='active'?'active':(p.status==='done'?'done':'')}"></div>`).join('');
}
function setActiveNav(view,day){
  document.querySelectorAll('.nav-item').forEach(n=>{
    const isDay=n.dataset.view==='day';
    let on = n.dataset.view===view && !isDay;
    if(view==='day'&&isDay&&Number(n.dataset.day)===Number(day)) on=true;
    n.classList.toggle('active',on);
  });
}
function router(){
  const raw=location.hash.replace(/^#\/?/,'')||'dashboard';
  const [view,param]=raw.split('/');
  switch(view){
    case 'calendar': viewCalendar(); break;
    case 'timeline': viewTimeline(); break;
    case 'roadmap': viewRoadmap(); break;
    case 'day': viewDay(param); break;
    default: viewDashboard();
  }
  setActiveNav(view,param);
  if(window.innerWidth<=900) closeSidebar();
}

/* ---------- mobile sidebar ---------- */
const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');
const hbtn=document.getElementById('hbtn');
function openSidebar(){sidebar.classList.add('open');overlay.classList.add('on');document.body.style.overflow='hidden';}
function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('on');document.body.style.overflow='';}
hbtn.addEventListener('click',openSidebar);
overlay.addEventListener('click',closeSidebar);

/* ---------- boot ---------- */
buildSidebarDays();
buildProgress();
window.addEventListener('hashchange',router);
router();
</script>
